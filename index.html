<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Regimento Interno - Igreja Bíblica em Guarapari</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-mode="public">
  <header class="app-header">
    <div class="header-inner">
      <div class="brand">
        <div class="logo-mark">IBG</div>
        <div>
          <h1>Regimento Interno</h1>
          <p>Igreja Bíblica em Guarapari</p>
        </div>
      </div>
      <div class="header-actions">
        <button class="btn ghost menu-toggle" onclick="openSidebar()">☰ Capítulos</button>
        <button class="btn ghost hide-mobile" onclick="window.print()">Imprimir/PDF</button>
      </div>
    </div>
  </header>

  <div id="sidebarBackdrop" class="sidebar-backdrop" onclick="closeSidebar()"></div>

  <div class="app">
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-head">
        <div class="sidebar-title">Capítulos</div>
        <small>Selecione uma seção do regimento</small>
      </div>
      <nav id="chapterMenu" class="chapter-nav"></nav>
    </aside>

    <main class="content">
      <div class="toolbar">
        <div class="search">
          <input id="searchInput" placeholder="Buscar artigo, palavra ou capítulo..." oninput="render()">
        </div>
        <button class="btn light" onclick="window.print()">Imprimir/PDF</button>
      </div>
      <div id="content"></div>
    </main>
  </div>

  <footer class="footer">Consulta pública do Regimento Interno.</footer>
  <div id="toast" class="toast"></div>
  <script src="app.js"></script>
</body>
</html>
